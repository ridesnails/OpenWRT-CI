name: Build sing-box only

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/sing-box/**'
      - '.github/workflows/build-sing-box.yml'

jobs:
  build-sing-box:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget python3 python3-pip python3-setuptools python3-pyelftools ccache libzstd1 libzstd-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Prepare OpenWrt SDK (or full source)
        run: |
          # 这里假设你已经有完整源码，如用SDK请替换为SDK下载解压
          echo "当前目录：$(pwd)"

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Select sing-box only
        run: |
          sed -i '/CONFIG_PACKAGE_sing-box/d' .config
          echo 'CONFIG_PACKAGE_sing-box=y' >> .config

      - name: Compile sing-box only
        run: |
          make package/sing-box/compile V=s

      - name: Upload sing-box ipk
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-ipk
          path: bin/packages/*/base/sing-box_*.ipk
          if-no-files-found: warn

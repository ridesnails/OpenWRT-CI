name: Build sing-box only

on:
  workflow_dispatch:
  push:
    paths:
      - 'package/sing-box/**'
      - '.github/workflows/build-sing-box.yml'

jobs:
  build-sing-box:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone OpenWrt source
        run: |
          git clone --depth=1 https://github.com/openwrt/openwrt.git openwrt

      - name: Copy sing-box package
        run: |
          cp -r package/sing-box openwrt/package/sing-box

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget python3 python3-pip python3-setuptools python3-pyelftools ccache libzstd1 libzstd-dev

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Select sing-box only
        run: |
          cd openwrt
          echo 'CONFIG_PACKAGE_sing-box=y' > .config

      - name: Compile sing-box only
        run: |
          cd openwrt
          make defconfig
          make package/sing-box/compile V=s

      - name: Upload sing-box ipk
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-ipk
          path: openwrt/bin/packages/*/base/sing-box_*.ipk
          if-no-files-found: warn
